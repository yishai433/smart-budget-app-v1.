name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env from GitHub Secrets
        run: |
          printf 'VITE_FIREBASE_API_KEY=%s\n' "${{ secrets.VITE_FIREBASE_API_KEY }}" | sed 's/\xef\xbb\xbf//g' >> .env
          printf 'VITE_FIREBASE_AUTH_DOMAIN=%s\n' "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" | sed 's/\xef\xbb\xbf//g' >> .env
          printf 'VITE_FIREBASE_PROJECT_ID=%s\n' "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" | sed 's/\xef\xbb\xbf//g' >> .env
          printf 'VITE_FIREBASE_STORAGE_BUCKET=%s\n' "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" | sed 's/\xef\xbb\xbf//g' >> .env
          printf 'VITE_FIREBASE_MESSAGING_SENDER_ID=%s\n' "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" | sed 's/\xef\xbb\xbf//g' >> .env
          printf 'VITE_FIREBASE_APP_ID=%s\n' "${{ secrets.VITE_FIREBASE_APP_ID }}" | sed 's/\xef\xbb\xbf//g' >> .env
          printf 'VITE_FIREBASE_MEASUREMENT_ID=%s\n' "${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" | sed 's/\xef\xbb\xbf//g' >> .env

      - name: Build
        run: npm run build


      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
